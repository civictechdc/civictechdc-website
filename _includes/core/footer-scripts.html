<script type="text/javascript">
  // Smooth-scroll the "Return to top" link. Progressive enhancement:
  // the href="#top" anchor still works if JS is unavailable.
  document.addEventListener("DOMContentLoaded", function () {
    const link = document.getElementById("returnToTopLink");
    if (link) {
      link.addEventListener("click", function (e) {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    }
  });
</script>
