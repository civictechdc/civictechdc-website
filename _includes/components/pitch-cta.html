<div class="ctdc-pitch-cta">
  <div class="ctdc-pitch-cta__body">
    <h2 class="ctdc-pitch-cta__title">Bring us a problem or an idea</h2>
    <p class="ctdc-pitch-cta__text">
      You do not need a finished plan. Start a private conversation about the
      people affected, the need, and what you know so far. We will explore
      validation, fit, scope, and volunteer capacity with you.
    </p>
  </div>
  <a
    href="{{ site.baseurl }}/pitch"
    class="usa-button ctdc-pitch-cta__btn"
    data-analytics-event="project_inquiry_click"
    data-analytics-location="shared_pitch_cta"
    >Start a project</a
  >
</div>
