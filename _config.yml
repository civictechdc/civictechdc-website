markdown: kramdown
name: Civic Tech DC
url: https://www.civictechdc.org
title: Civic Tech DC
description: "Join Civic Tech DC, a nonprofit volunteer community building open-source technology for civic engagement, democracy, and public-interest work in the DMV."
default_social_image: hero-image-homepage.jpg
default_social_image_alt: Civic Tech DC volunteers collaborating on laptops around tables at a project night
lang: en-US
encoding: utf-8
timezone: America/New_York
plugins:
  - jekyll-redirect-from
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-feed
future: true
baseurl: ""

# Keep blog posts under /blog/ regardless of their categories.
# Scoped to posts only (via defaults) so the global permalink style is unchanged
# and projects/events/pages keep their existing URLs. Without this, Jekyll's default
# scheme prefixes a post's categories to its URL (e.g. a "Community" post lands at
# /community/..., colliding with the Community page).
defaults:
  - scope:
      path: ""
      type: posts
    values:
      permalink: /blog/:year/:month/:day/:title/

collections:
  projects:
    output: true
  events:
    output: true
    permalink: /events/:name/

# Jekyll Archives for tag and category pages
jekyll-archives:
  enabled:
    - categories
    - tags
  layout: archive
  permalinks:
    category: "/blog/category/:name/"
    tag: "/blog/tag/:name/"

exclude:
  - /node_modules/
  - /.playwright-mcp/
  - gulpfile.js
  - Gemfile
  - Gemfile.lock
  - npm-debug.log
  - /sass
  - README.md
  - CONTRIBUTING.md
  - CLAUDE.md
  - package.json
  - package-lock.json
  - /scripts
