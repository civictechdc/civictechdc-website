---
layout: default
---
<h1 class="margin-bottom-1">Project: {{ page.title }}</h1>
<ul class="ctdc-project-links margin-top-0 padding-left-0 font-heading-med">
  {% if page.github_link %}
    <li>
      <a href="{{ page.github_link }}" target="_blank">
        <svg class="usa-icon" aria-hidden="true" focusable="false" role="img">
          <use xlink:href="/assets/img/sprite.svg#code"></use>
        </svg>
        GitHub
      </a>
    </li>
  {% endif %}
  {% if page.slack_channel %}
    <li>
      <a
        href="https://slack.com/app_redirect?channel={{ page.slack_channel }}"
        target="_blank"
      >
        <svg class="usa-icon" aria-hidden="true" focusable="false" role="img">
          <use xlink:href="/assets/img/sprite.svg#forum"></use>
        </svg>
        Slack
      </a>
    </li>
  {% endif %}
</ul>
{%
  include responsive-image.html src=page.image alt=page.image_alt_text
  class="maxh-mobile"
%}
<div class="usa-prose">{{ page.content }}</div>
